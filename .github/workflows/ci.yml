name: CI

on:
  pull_request:
    paths:
      - ".github/workflows/ci.yml"
      - "api/**/*.cs"
      - "api/**/*.csproj"
      - "api/**/*.json"
      - "api/**/*.props"
      - "api/**/*.targets"
      - "api/**/*.slnx"
      - "api/**/*.http"
      - "api/.editorconfig"
      - "api/Directory.Build.props"
      - "api/Directory.Packages.props"
      - "api/DiscWeave.slnx"
      - "api/global.json"
      - "app/.editorconfig"
      - "app/.nvmrc"
      - "app/.prettierrc.json"
      - "app/electron/**"
      - "app/eslint.config.js"
      - "app/index.html"
      - "app/package-lock.json"
      - "app/package.json"
      - "app/public/**"
      - "app/resources/**"
      - "app/scripts/**"
      - "app/src/**"
      - "app/tsconfig*.json"
      - "app/vite.config.ts"
      - "app/vitest.config.ts"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/ci.yml"
      - "api/**/*.cs"
      - "api/**/*.csproj"
      - "api/**/*.json"
      - "api/**/*.props"
      - "api/**/*.targets"
      - "api/**/*.slnx"
      - "api/**/*.http"
      - "api/.editorconfig"
      - "api/Directory.Build.props"
      - "api/Directory.Packages.props"
      - "api/DiscWeave.slnx"
      - "api/global.json"
      - "app/.editorconfig"
      - "app/.nvmrc"
      - "app/.prettierrc.json"
      - "app/electron/**"
      - "app/eslint.config.js"
      - "app/index.html"
      - "app/package-lock.json"
      - "app/package.json"
      - "app/public/**"
      - "app/resources/**"
      - "app/scripts/**"
      - "app/src/**"
      - "app/tsconfig*.json"
      - "app/vite.config.ts"
      - "app/vitest.config.ts"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  changes:
    name: Changed build inputs
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      app: ${{ steps.filter.outputs.app }}
      workflow: ${{ steps.filter.outputs.workflow }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Detect changed build inputs
        id: filter
        env:
          BEFORE_SHA: ${{ github.event.before }}
          EVENT_NAME: ${{ github.event_name }}
          HEAD_SHA: ${{ github.sha }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            base_sha="${PR_BASE_SHA}"
            head_sha="${PR_HEAD_SHA}"
          else
            base_sha="${BEFORE_SHA}"
            head_sha="${HEAD_SHA}"
          fi

          if [[ -z "${base_sha}" || "${base_sha}" =~ ^0+$ ]]; then
            base_sha="$(git rev-list --max-parents=0 "${head_sha}")"
          fi

          git diff --name-only "${base_sha}" "${head_sha}" > changed-files.txt

          api=false
          app=false
          workflow=false

          while IFS= read -r file_path; do
            case "${file_path}" in
              .github/workflows/ci.yml)
                workflow=true
                ;;
              api/*.cs|api/*.csproj|api/*.json|api/*.props|api/*.targets|api/*.slnx|api/*.http|api/.editorconfig|api/global.json)
                api=true
                ;;
              app/.editorconfig|app/.nvmrc|app/.prettierrc.json|app/electron/*|app/eslint.config.js|app/index.html|app/package-lock.json|app/package.json|app/public/*|app/resources/*|app/scripts/*|app/src/*|app/tsconfig*.json|app/vite.config.ts|app/vitest.config.ts)
                app=true
                ;;
            esac
          done < changed-files.txt

          {
            echo "api=${api}"
            echo "app=${app}"
            echo "workflow=${workflow}"
          } >> "${GITHUB_OUTPUT}"

          echo "API changed: ${api}"
          echo "App changed: ${app}"
          echo "Workflow changed: ${workflow}"

  api:
    name: API
    needs: changes
    if: needs.changes.outputs.api == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9
        with:
          global-json-file: api/global.json
      - name: Restore API
        run: dotnet restore DiscWeave.slnx
        working-directory: api
      - name: Audit API dependencies
        run: |
          dotnet list DiscWeave.slnx package --vulnerable --include-transitive --format json > nuget-vulnerabilities.json
          node <<'NODE'
          const fs = require('node:fs')

          const report = JSON.parse(
            fs.readFileSync('nuget-vulnerabilities.json', 'utf8'),
          )
          const vulnerablePackages = []

          for (const project of report.projects ?? []) {
            for (const framework of project.frameworks ?? []) {
              for (const section of [
                'topLevelPackages',
                'transitivePackages',
              ]) {
                for (const packageInfo of framework[section] ?? []) {
                  if ((packageInfo.vulnerabilities ?? []).length === 0) {
                    continue
                  }

                  vulnerablePackages.push({
                    framework: framework.framework,
                    id: packageInfo.id,
                    project: project.path,
                    version: packageInfo.resolvedVersion,
                    vulnerabilities: packageInfo.vulnerabilities,
                  })
                }
              }
            }
          }

          if (vulnerablePackages.length === 0) {
            console.log('No vulnerable NuGet packages found.')
            process.exit(0)
          }

          console.error('Vulnerable NuGet packages found:')
          for (const packageInfo of vulnerablePackages) {
            console.error(
              `- ${packageInfo.id} ${packageInfo.version} in ${packageInfo.project} (${packageInfo.framework})`,
            )
            for (const vulnerability of packageInfo.vulnerabilities) {
              console.error(
                `  ${vulnerability.severity}: ${vulnerability.advisoryurl}`,
              )
            }
          }
          process.exit(1)
          NODE
        working-directory: api
      - name: Check API formatting
        run: dotnet format DiscWeave.slnx --verify-no-changes --verbosity minimal
        working-directory: api
      - name: Build API
        run: dotnet build DiscWeave.slnx --configuration Release --no-restore
        working-directory: api
      - name: Test API
        run: dotnet test DiscWeave.slnx --configuration Release --no-build --logger trx
        working-directory: api
      - name: Upload API test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: api-test-results
          path: api/**/TestResults/*.trx
          if-no-files-found: ignore
          retention-days: 14
      - name: Publish local API smoke artifact
        run: dotnet publish src/DiscWeave.Api/DiscWeave.Api.csproj --configuration Release --runtime osx-arm64 --self-contained true --output ../artifacts/local-api-osx-arm64
        working-directory: api
      - name: Upload local API smoke artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: local-api-osx-arm64
          path: artifacts/local-api-osx-arm64
          if-no-files-found: error
          retention-days: 14

  app:
    name: App and desktop
    needs: changes
    if: needs.changes.outputs.app == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: app/.nvmrc
          cache: npm
          cache-dependency-path: app/package-lock.json
      - name: Install app dependencies
        run: npm ci
        working-directory: app
      - name: Audit app dependencies
        run: npm audit --audit-level=high
        working-directory: app
      - name: Check app formatting
        run: npm run format:check
        working-directory: app
      - name: Lint app
        run: npm run lint
        working-directory: app
      - name: Typecheck app
        run: npm run typecheck
        working-directory: app
      - name: Test app and Electron contracts
        run: npm test
        working-directory: app
      - name: Check file sizes
        run: npm run file-size:check
        working-directory: app
      - name: Build app
        run: npm run build
        working-directory: app
      - name: Upload web build artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: app-web-dist
          path: app/dist
          if-no-files-found: error
          retention-days: 14
